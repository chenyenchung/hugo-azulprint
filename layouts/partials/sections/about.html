{{- $page := .page -}}
{{- if and $page $page.Content -}}
<section class="sec sec--about" id="{{ .id | default "about" }}">
  {{ partial "sections/_header.html" . }}
  <div class="about">
    <div>{{ $page.Content }}</div>
    {{ with $page.Params.aside }}
    <aside class="aside">
      {{ with .label }}<div class="lbl">{{ . }}</div>{{ end }}
      {{ .body | markdownify }}
    </aside>
    {{ end }}
  </div>
</section>
{{- end -}}
